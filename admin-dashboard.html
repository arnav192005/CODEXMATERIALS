<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard - User Data</title>

  <style>
    :root {
      --bg: #0f172a;
      --bg-light: #111827;
      --primary: #3b82f6;
      --accent: #22c55e;
      --text: #e5e7eb;
      --muted: #9ca3af;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      background: radial-gradient(circle at top, #1f2937 0, #020617 50%);
      color: var(--text);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
    }

    .header {
      background: linear-gradient(135deg, rgba(59, 130, 246, 0.2), rgba(139, 92, 246, 0.2));
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 16px;
      padding: 30px;
      margin-bottom: 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 20px;
    }

    .header h1 {
      font-size: 32px;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .stats {
      display: flex;
      gap: 30px;
      align-items: center;
    }

    .stat-item {
      text-align: center;
    }

    .stat-value {
      font-size: 28px;
      font-weight: bold;
      color: var(--accent);
    }

    .stat-label {
      font-size: 12px;
      color: var(--muted);
      margin-top: 5px;
    }

    .actions {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 12px 24px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      border: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), #8b5cf6);
      color: white;
    }

    .btn-success {
      background: linear-gradient(135deg, var(--accent), #16a34a);
      color: white;
    }

    .btn-danger {
      background: linear-gradient(135deg, #ef4444, #dc2626);
      color: white;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(59, 130, 246, 0.4);
    }

    .filters {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
      align-items: center;
    }

    .filters input, .filters select {
      padding: 10px 15px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(139, 92, 246, 0.3);
      border-radius: 8px;
      color: #b0b8c4;
      font-size: 14px;
    }

    .filters select option {
      background: #1a1f2e;
      color: #b0b8c4;
    }

    .filters input:focus, .filters select:focus {
      outline: none;
      border-color: rgba(139, 92, 246, 0.6);
      box-shadow: 0 0 15px rgba(139, 92, 246, 0.3);
    }

    .table-container {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 12px;
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead {
      background: rgba(139, 92, 246, 0.2);
    }

    th {
      padding: 15px;
      text-align: left;
      font-weight: 600;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.9);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    td {
      padding: 15px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      font-size: 13px;
    }

    tbody tr {
      transition: background 0.2s ease;
    }

    tbody tr:hover {
      background: rgba(139, 92, 246, 0.1);
    }

    .badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 600;
    }

    .badge-cse { background: rgba(59, 130, 246, 0.3); color: #60a5fa; }
    .badge-ece { background: rgba(139, 92, 246, 0.3); color: #a78bfa; }
    .badge-me { background: rgba(251, 146, 60, 0.3); color: #fb923c; }
    .badge-ce { background: rgba(34, 197, 94, 0.3); color: #4ade80; }
    .badge-ee { background: rgba(234, 179, 8, 0.3); color: #facc15; }
    .badge-it { background: rgba(236, 72, 153, 0.3); color: #f472b6; }

    .delete-btn {
      background: rgba(239, 68, 68, 0.2);
      border: 1px solid rgba(239, 68, 68, 0.5);
      color: #fca5a5;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .delete-btn:hover {
      background: rgba(239, 68, 68, 0.3);
      transform: scale(1.05);
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }

    .empty-state-icon {
      font-size: 64px;
      margin-bottom: 20px;
      opacity: 0.5;
    }

    @media (max-width: 768px) {
      .header {
        flex-direction: column;
        align-items: flex-start;
      }

      .stats {
        width: 100%;
        justify-content: space-around;
      }

      .table-container {
        overflow-x: auto;
      }

      table {
        min-width: 800px;
      }
    }
  </style>
</head>
<body>
  <!-- Back to Home Link -->
  <div style="position: fixed; top: 20px; left: 20px; z-index: 1000;">
    <a href="index.html" style="color: rgba(255,255,255,0.7); text-decoration: none; font-size: 14px; display: flex; align-items: center; gap: 5px; padding: 8px 16px; background: rgba(255,255,255,0.05); border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); transition: all 0.3s;" onmouseover="this.style.background='rgba(255,255,255,0.1)'; this.style.color='#fff';" onmouseout="this.style.background='rgba(255,255,255,0.05)'; this.style.color='rgba(255,255,255,0.7)';">
      ← Back to Home
    </a>
  </div>

  <div class="container">
    <div class="header">
      <div>
        <h1>📊 User Dashboard</h1>
        <div class="stats">
          <div class="stat-item">
            <div class="stat-value" id="totalUsers">0</div>
            <div class="stat-label">Total Users</div>
          </div>
          <div class="stat-item">
            <div class="stat-value" id="todayUsers">0</div>
            <div class="stat-label">Today</div>
          </div>
        </div>
      </div>
      <div class="actions">
        <button class="btn btn-success" onclick="exportToCSV()">
          📥 Export CSV
        </button>
        <button class="btn btn-primary" onclick="exportToExcel()">
          📊 Export Excel
        </button>
        <button class="btn btn-danger" onclick="clearAllData()">
          🗑️ Clear All
        </button>
      </div>
    </div>

    <div class="filters">
      <input type="text" id="searchInput" placeholder="🔍 Search by name or email..." style="flex: 1; min-width: 250px;">
      <select id="departmentFilter">
        <option value="">All Departments</option>
        <option value="CSE">Computer Science</option>
        <option value="ECE">Electronics & Communication</option>
        <option value="ME">Mechanical</option>
        <option value="CE">Civil</option>
        <option value="EE">Electrical</option>
        <option value="IT">Information Technology</option>
      </select>
      <select id="semesterFilter">
        <option value="">All Semesters</option>
        <option value="1">1st Semester</option>
        <option value="2">2nd Semester</option>
        <option value="3">3rd Semester</option>
        <option value="4">4th Semester</option>
        <option value="5">5th Semester</option>
        <option value="6">6th Semester</option>
        <option value="7">7th Semester</option>
        <option value="8">8th Semester</option>
      </select>
      <button class="btn btn-primary" onclick="applyFilters()">Apply Filters</button>
    </div>

    <div class="table-container">
      <table id="usersTable">
        <thead>
          <tr>
            <th>#</th>
            <th>Name</th>
            <th>Email</th>
            <th>Department</th>
            <th>Semester</th>
            <th>College</th>
            <th>Joined</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <!-- Data will be populated here -->
        </tbody>
      </table>
    </div>
  </div>

  <script>
    let allUsers = [];

    // Load users on page load
    function loadUsers() {
      allUsers = JSON.parse(localStorage.getItem('users')) || [];
      updateStats();
      displayUsers(allUsers);
    }

    // Update statistics
    function updateStats() {
      document.getElementById('totalUsers').textContent = allUsers.length;
      
      const today = new Date().toDateString();
      const todayCount = allUsers.filter(user => {
        return new Date(user.createdAt).toDateString() === today;
      }).length;
      document.getElementById('todayUsers').textContent = todayCount;
    }

    // Display users in table
    function displayUsers(users) {
      const tbody = document.getElementById('tableBody');
      
      if (users.length === 0) {
        tbody.innerHTML = `
          <tr>
            <td colspan="8">
              <div class="empty-state">
                <div class="empty-state-icon">📭</div>
                <h3>No users found</h3>
                <p>Users who sign up will appear here</p>
              </div>
            </td>
          </tr>
        `;
        return;
      }

      tbody.innerHTML = users.map((user, index) => {
        const date = new Date(user.createdAt);
        const formattedDate = date.toLocaleDateString() + ' ' + date.toLocaleTimeString();
        
        return `
          <tr>
            <td>${index + 1}</td>
            <td><strong>${user.firstName} ${user.lastName}</strong></td>
            <td>${user.email}</td>
            <td><span class="badge badge-${user.department.toLowerCase()}">${user.department}</span></td>
            <td>${user.semester}</td>
            <td>${user.college}</td>
            <td>${formattedDate}</td>
            <td>
              <button class="delete-btn" onclick="deleteUser('${user.id}')">Delete</button>
            </td>
          </tr>
        `;
      }).join('');
    }

    // Apply filters
    function applyFilters() {
      const searchTerm = document.getElementById('searchInput').value.toLowerCase();
      const deptFilter = document.getElementById('departmentFilter').value;
      const semFilter = document.getElementById('semesterFilter').value;

      let filtered = allUsers;

      if (searchTerm) {
        filtered = filtered.filter(user => 
          user.firstName.toLowerCase().includes(searchTerm) ||
          user.lastName.toLowerCase().includes(searchTerm) ||
          user.email.toLowerCase().includes(searchTerm)
        );
      }

      if (deptFilter) {
        filtered = filtered.filter(user => user.department === deptFilter);
      }

      if (semFilter) {
        filtered = filtered.filter(user => user.semester === semFilter);
      }

      displayUsers(filtered);
    }

    // Export to CSV
    function exportToCSV() {
      if (allUsers.length === 0) {
        alert('No data to export!');
        return;
      }

      const headers = ['ID', 'First Name', 'Last Name', 'Email', 'Department', 'Semester', 'College', 'Created At'];
      const csvRows = [headers.join(',')];

      allUsers.forEach(user => {
        const row = [
          user.id,
          user.firstName,
          user.lastName,
          user.email,
          user.department,
          user.semester,
          `"${user.college}"`,
          user.createdAt
        ];
        csvRows.push(row.join(','));
      });

      const csvContent = csvRows.join('\n');
      const blob = new Blob([csvContent], { type: 'text/csv' });
      const url = window.URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'codex_users_' + new Date().toISOString().split('T')[0] + '.csv';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      window.URL.revokeObjectURL(url);
    }

    // Export to Excel format (actually CSV but named .xlsx for Excel opening)
    function exportToExcel() {
      if (allUsers.length === 0) {
        alert('No data to export!');
        return;
      }

      // Create more detailed Excel-friendly format
      const headers = ['ID', 'First Name', 'Last Name', 'Email', 'Department', 'Semester', 'College', 'Created Date', 'Created Time'];
      const csvRows = [headers.join('\t')]; // Tab-separated for Excel

      allUsers.forEach(user => {
        const date = new Date(user.createdAt);
        const row = [
          user.id,
          user.firstName,
          user.lastName,
          user.email,
          user.department,
          user.semester,
          user.college,
          date.toLocaleDateString(),
          date.toLocaleTimeString()
        ];
        csvRows.push(row.join('\t'));
      });

      const csvContent = csvRows.join('\n');
      const blob = new Blob([csvContent], { type: 'application/vnd.ms-excel' });
      const url = window.URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'codex_users_' + new Date().toISOString().split('T')[0] + '.xls';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      window.URL.revokeObjectURL(url);
    }

    // Delete single user
    function deleteUser(userId) {
      if (!confirm('Are you sure you want to delete this user?')) {
        return;
      }

      allUsers = allUsers.filter(user => user.id !== userId);
      localStorage.setItem('users', JSON.stringify(allUsers));
      loadUsers();
    }

    // Clear all data
    function clearAllData() {
      if (!confirm('⚠️ WARNING: This will delete ALL user data permanently! Are you sure?')) {
        return;
      }

      if (!confirm('This action cannot be undone. Continue?')) {
        return;
      }

      localStorage.removeItem('users');
      allUsers = [];
      loadUsers();
      alert('All data has been cleared.');
    }

    // Add event listeners
    document.getElementById('searchInput').addEventListener('input', applyFilters);
    document.getElementById('departmentFilter').addEventListener('change', applyFilters);
    document.getElementById('semesterFilter').addEventListener('change', applyFilters);

    // Initial load
    loadUsers();

    // Auto-refresh every 5 seconds
    setInterval(loadUsers, 5000);
  </script>
</body>
</html>
