<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#0f172a" />
  <title>Login - CODEX</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      background: #000000;
      color: #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      margin: 0;
      padding: 0;
    }

    @keyframes gradientFlow {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    /* Floating Particles */
    .particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }

    .particle {
      position: absolute;
      width: 3px;
      height: 3px;
      background: rgba(96, 165, 250, 0.6);
      border-radius: 50%;
      animation: floatParticle 8s linear infinite;
      box-shadow: 0 0 10px rgba(96, 165, 250, 0.8);
    }

    @keyframes floatParticle {
      0% { transform: translateY(100vh) translateX(0) scale(0); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateY(-100px) translateX(50px) scale(1); opacity: 0; }
    }

    .particle:nth-child(2n) {
      animation-duration: 10s;
      animation-delay: 2s;
      background: rgba(34, 197, 94, 0.6);
      box-shadow: 0 0 10px rgba(34, 197, 94, 0.8);
    }

    /* Login Container */
    .login-container {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 420px;
      padding: 20px;
      animation: fadeInUp 0.8s ease-out;
    }

    @keyframes fadeInUp {
      from { transform: translateY(30px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .login-card {
      background: rgba(17, 24, 39, 0.9);
      border-radius: 24px;
      padding: 40px 32px;
      border: 2px solid rgba(96, 165, 250, 0.3);
      backdrop-filter: blur(20px);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), 0 0 40px rgba(59, 130, 246, 0.2);
      position: relative;
      overflow: hidden;
    }

    .login-card::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at 50% 50%, rgba(59, 130, 246, 0.1) 0%, transparent 70%);
      animation: rotateGlow 20s linear infinite;
      pointer-events: none;
    }

    @keyframes rotateGlow {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .login-header {
      text-align: center;
      margin-bottom: 32px;
      position: relative;
    }

    .login-logo {
      width: 60px;
      height: 60px;
      margin: 0 auto 16px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #56a1f7, #eb253f);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 28px;
      color: #0b1120;
      box-shadow: 0 0 30px rgba(59, 130, 246, 0.8);
      animation: logoPulse 2s ease-in-out infinite;
    }

    @keyframes logoPulse {
      0%, 100% { transform: scale(1); box-shadow: 0 0 30px rgba(59, 130, 246, 0.8); }
      50% { transform: scale(1.05); box-shadow: 0 0 50px rgba(59, 130, 246, 1); }
    }

    .login-title {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #60a5fa, #34d399);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .login-subtitle {
      font-size: 14px;
      color: #9ca3af;
    }

    .form-group {
      margin-bottom: 20px;
      position: relative;
    }

    .form-label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 8px;
      color: #e5e7eb;
    }

    .form-input {
      width: 100%;
      padding: 12px 16px;
      font-size: 15px;
      background: rgba(31, 41, 55, 0.6);
      border: 2px solid rgba(148, 163, 184, 0.3);
      border-radius: 12px;
      color: #e5e7eb;
      outline: none;
      transition: all 0.3s ease;
      backdrop-filter: blur(10px);
    }

    .form-input:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1), 0 0 20px rgba(59, 130, 246, 0.3);
      background: rgba(31, 41, 55, 0.8);
    }

    .form-input::placeholder {
      color: #6b7280;
    }

    .password-toggle {
      position: absolute;
      right: 16px;
      top: 38px;
      cursor: pointer;
      color: #9ca3af;
      transition: color 0.3s ease;
    }

    .password-toggle:hover {
      color: #3b82f6;
    }

    .forgot-password {
      text-align: right;
      margin-bottom: 24px;
    }

    .forgot-password a {
      font-size: 13px;
      color: #3b82f6;
      text-decoration: none;
      transition: color 0.3s ease;
    }

    .forgot-password a:hover {
      color: #60a5fa;
      text-decoration: underline;
    }

    .reset-modal {
      position: fixed;
      inset: 0;
      background: rgba(2, 6, 23, 0.72);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1200;
      padding: 16px;
    }

    .reset-modal.show {
      display: flex;
      animation: fadeInModal 0.2s ease;
    }

    @keyframes fadeInModal {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .reset-modal-card {
      width: 100%;
      max-width: 420px;
      background: rgba(17, 24, 39, 0.95);
      border: 1px solid rgba(96, 165, 250, 0.35);
      border-radius: 14px;
      padding: 18px;
      box-shadow: 0 16px 42px rgba(0, 0, 0, 0.45);
    }

    .reset-modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .reset-modal-header h3 {
      font-size: 18px;
      color: #93c5fd;
      margin: 0;
    }

    .reset-modal-close {
      border: none;
      background: rgba(239, 68, 68, 0.16);
      color: #fca5a5;
      border-radius: 8px;
      width: 32px;
      height: 32px;
      cursor: pointer;
      font-weight: 700;
      font-size: 16px;
    }

    .reset-modal-help {
      font-size: 12px;
      color: #9ca3af;
      margin: 0 0 14px;
    }

    .reset-feedback {
      display: none;
      border-radius: 10px;
      padding: 10px 12px;
      margin-bottom: 12px;
      font-size: 13px;
      line-height: 1.45;
    }

    .reset-feedback.error {
      display: block;
      background: rgba(239, 68, 68, 0.16);
      border: 1px solid rgba(239, 68, 68, 0.45);
      color: #fecaca;
    }

    .reset-feedback.success {
      display: block;
      background: rgba(34, 197, 94, 0.16);
      border: 1px solid rgba(34, 197, 94, 0.45);
      color: #bbf7d0;
    }

    .reset-submit-btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: #f8fafc;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      margin-top: 4px;
    }

    .reset-submit-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 18px rgba(34, 197, 94, 0.35);
    }

    .login-btn {
      width: 100%;
      padding: 14px;
      font-size: 16px;
      font-weight: 600;
      color: #fff;
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
      position: relative;
      overflow: hidden;
    }

    .login-btn::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.3);
      transform: translate(-50%, -50%);
      transition: width 0.6s, height 0.6s;
    }

    .login-btn:hover::before {
      width: 300px;
      height: 300px;
    }

    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(59, 130, 246, 0.5);
    }

    .login-btn:active {
      transform: translateY(0);
    }

    .signup-inline {
      text-align: center;
      margin-top: 12px;
      font-size: 13px;
      color: #9ca3af;
    }

    .signup-inline a {
      color: #60a5fa;
      text-decoration: none;
      font-weight: 600;
      margin-left: 4px;
    }

    .signup-inline a:hover {
      color: #93c5fd;
      text-decoration: underline;
    }

    .divider {
      display: flex;
      align-items: center;
      text-align: center;
      margin: 24px 0;
      color: #6b7280;
      font-size: 13px;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      border-bottom: 1px solid rgba(148, 163, 184, 0.3);
    }

    .divider span {
      padding: 0 12px;
    }

    .social-login {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 24px;
    }

    .social-btn {
      padding: 12px;
      font-size: 14px;
      font-weight: 500;
      background: rgba(31, 41, 55, 0.6);
      border: 2px solid rgba(148, 163, 184, 0.3);
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s ease;
      color: #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .social-btn:hover {
      border-color: #3b82f6;
      background: rgba(59, 130, 246, 0.1);
      transform: translateY(-2px);
    }

    .google-signin-container {
      min-height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      padding: 6px;
    }

    .guest-btn {
      background: rgba(34, 197, 94, 0.1);
      border-color: rgba(34, 197, 94, 0.3);
    }

    .guest-btn:hover {
      border-color: #22c55e;
      background: rgba(34, 197, 94, 0.2);
    }

    .signup-link {
      text-align: center;
      font-size: 14px;
      color: #9ca3af;
      margin-top: 24px;
    }

    .signup-link a {
      color: #3b82f6;
      text-decoration: none;
      font-weight: 600;
      transition: color 0.3s ease;
    }

    .signup-link a:hover {
      color: #60a5fa;
      text-decoration: underline;
    }

    .back-home {
      text-align: center;
      margin-top: 20px;
    }

    .back-home a {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      color: #9ca3af;
      text-decoration: none;
      transition: all 0.3s ease;
    }

    .back-home a:hover {
      color: #3b82f6;
      transform: translateX(-4px);
    }

    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 20px;
    }

    .checkbox-group input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
      accent-color: #3b82f6;
    }

    .checkbox-group label {
      font-size: 14px;
      color: #e5e7eb;
      cursor: pointer;
    }

    @media (max-width: 480px) {
      .login-card {
        padding: 32px 24px;
      }

      .social-login {
        grid-template-columns: 1fr;
      }
    }
  </style>

  <!-- EmailJS SDK -->
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script type="text/javascript">
    (function(){
      // Initialize EmailJS with your public key
      // Replace 'YOUR_PUBLIC_KEY' with your actual EmailJS public key
      emailjs.init('YOUR_PUBLIC_KEY');
    })();
  </script>
</head>
<body>
  <!-- Back to Home Link -->
  <div style="position: fixed; top: 20px; left: 20px; z-index: 1000;">
    <a href="index.html" style="color: rgba(255,255,255,0.7); text-decoration: none; font-size: 14px; display: flex; align-items: center; gap: 5px; padding: 8px 16px; background: rgba(255,255,255,0.05); border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); transition: all 0.3s;" onmouseover="this.style.background='rgba(255,255,255,0.1)'; this.style.color='#fff';" onmouseout="this.style.background='rgba(255,255,255,0.05)'; this.style.color='rgba(255,255,255,0.7)';">
      ← Back to Home
    </a>
  </div>

  <div id="resetPasswordModal" class="reset-modal" role="dialog" aria-modal="true" aria-label="Reset Password">
    <div class="reset-modal-card">
      <div class="reset-modal-header">
        <h3>Reset Password</h3>
        <button type="button" id="resetModalCloseBtn" class="reset-modal-close">✕</button>
      </div>
      <p class="reset-modal-help">Enter your registered email and set a new password.</p>

      <div id="resetFeedback" class="reset-feedback"></div>

      <form id="resetPasswordForm">
        <div class="form-group">
          <label class="form-label" for="resetEmail">Registered Email</label>
          <input type="email" id="resetEmail" class="form-input" placeholder="your.email@example.com" required />
        </div>

        <div class="form-group">
          <label class="form-label" for="resetNewPassword">New Password</label>
          <input type="password" id="resetNewPassword" class="form-input" placeholder="Minimum 8 characters" minlength="8" required />
        </div>

        <div class="form-group">
          <label class="form-label" for="resetConfirmPassword">Confirm Password</label>
          <input type="password" id="resetConfirmPassword" class="form-input" placeholder="Re-enter new password" required />
        </div>

        <button type="submit" class="reset-submit-btn">Update Password</button>
      </form>
    </div>
  </div>


  <!-- Floating Particles -->
  <div class="particles" id="particles"></div>

  <!-- Login Container -->
  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <div class="login-logo">S</div>
        <h1 class="login-title">Welcome Back!</h1>
        <p class="login-subtitle">Login to access your study materials</p>
      </div>

      <form id="loginForm">
        <div class="form-group">
          <label class="form-label" for="email">Email Address</label>
          <input 
            type="email" 
            id="email" 
            class="form-input" 
            placeholder="your.email@example.com"
            required
          />
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input 
            type="password" 
            id="password" 
            class="form-input" 
            placeholder="Enter your password"
            required
          />
          <span class="password-toggle" id="togglePassword">👁️</span>
        </div>

        <div class="checkbox-group">
          <input type="checkbox" id="remember" />
          <label for="remember">Remember me</label>
        </div>

        <div class="forgot-password">
          <a href="#" id="forgotPasswordLink">Forgot Password?</a>
        </div>

        <button type="submit" class="login-btn">
          <span>Sign In</span>
        </button>

        <div class="signup-inline">
          New user?<a href="signup.html">Sign Up</a>
        </div>
      </form>

      <div class="divider">
        <span>OR CONTINUE WITH</span>
      </div>

      <div class="social-login">
        <div class="social-btn google-signin-container" id="googleSignInContainer"></div>
        <button class="social-btn guest-btn" id="guestLogin">
          <span>👤</span>
          Guest
        </button>
      </div>

    </div>

    <div class="back-home">
      <a href="index.html">
        <span>←</span>
        Back to Home
      </a>
    </div>
  </div>

  <script>
    const GOOGLE_CLIENT_ID = 'YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com';
    const AUTH_SESSION_KEY = 'authSession';
    const SESSION_DURATION_MS = 7 * 24 * 60 * 60 * 1000;

    function clearAuthSession() {
      localStorage.removeItem('currentUser');
      localStorage.removeItem(AUTH_SESSION_KEY);
      localStorage.removeItem('rememberedEmail');
    }

    function getValidCurrentUser() {
      const currentUserRaw = localStorage.getItem('currentUser');
      const authSessionRaw = localStorage.getItem(AUTH_SESSION_KEY);

      if (!currentUserRaw || !authSessionRaw) {
        return null;
      }

      try {
        const currentUser = JSON.parse(currentUserRaw);
        const authSession = JSON.parse(authSessionRaw);
        const expiresAt = Number(authSession.expiresAt || 0);

        if (!expiresAt || Date.now() > expiresAt) {
          clearAuthSession();
          return null;
        }

        return currentUser;
      } catch (error) {
        clearAuthSession();
        return null;
      }
    }

    function createAuthSession() {
      const now = Date.now();
      localStorage.setItem(AUTH_SESSION_KEY, JSON.stringify({
        createdAt: now,
        expiresAt: now + SESSION_DURATION_MS
      }));
    }

    function parseJwt(token) {
      try {
        const base64Url = token.split('.')[1];
        const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
        const jsonPayload = decodeURIComponent(
          atob(base64)
            .split('')
            .map(function (c) {
              return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            })
            .join('')
        );
        return JSON.parse(jsonPayload);
      } catch (error) {
        console.error('Failed to parse Google token:', error);
        return null;
      }
    }

    function handleGoogleSignIn(response) {
      if (!response || !response.credential) {
        alert('Google login failed. Please try again.');
        return;
      }

      const payload = parseJwt(response.credential);
      if (!payload || !payload.email) {
        alert('Unable to read Google account details.');
        return;
      }

      const email = String(payload.email).toLowerCase();
      const firstName = payload.given_name || 'Google';
      const lastName = payload.family_name || 'User';
      const username = email.split('@')[0] || 'googleuser';

      const users = JSON.parse(localStorage.getItem('users')) || [];
      let matchedUser = users.find((user) => (user.email || '').toLowerCase() === email);

      if (!matchedUser) {
        matchedUser = {
          id: 'user-' + Date.now(),
          firstName,
          lastName,
          username,
          email,
          password: '',
          department: '',
          semester: '',
          collegeIdNo: '',
          college: '',
          createdAt: new Date().toISOString(),
          authProvider: 'google'
        };
        users.push(matchedUser);
        localStorage.setItem('users', JSON.stringify(users));
      }

      localStorage.setItem('currentUser', JSON.stringify({
        id: matchedUser.id,
        username: matchedUser.username || username,
        email,
        fullName: `${matchedUser.firstName || firstName} ${matchedUser.lastName || lastName}`.trim(),
        department: matchedUser.department || '',
        semester: matchedUser.semester || ''
      }));
      createAuthSession();
      sessionStorage.setItem('skipAutoLoginMessageOnce', '1');

      localStorage.setItem('studentProfile', JSON.stringify({
        fullName: `${matchedUser.firstName || firstName} ${matchedUser.lastName || lastName}`.trim(),
        username: matchedUser.username || username,
        email,
        department: matchedUser.department || '',
        semester: matchedUser.semester || '',
        collegeIdNo: matchedUser.collegeIdNo || '',
        college: matchedUser.college || ''
      }));

      sendLoginNotification(email, 'Google Login');

      setTimeout(() => {
        window.location.href = 'index.html';
      }, 700);
    }

    function setupGoogleSignIn() {
      const container = document.getElementById('googleSignInContainer');
      if (!container) {
        return;
      }

      if (!window.google || !google.accounts || !google.accounts.id) {
        container.innerHTML = '<span style="font-size:12px;color:#9ca3af;">Google Sign-In loading...</span>';
        return;
      }

      if (GOOGLE_CLIENT_ID.indexOf('YOUR_GOOGLE_CLIENT_ID') === 0) {
        container.innerHTML = '<span style="font-size:12px;color:#9ca3af;">Set Google Client ID</span>';
        return;
      }

      google.accounts.id.initialize({
        client_id: GOOGLE_CLIENT_ID,
        callback: handleGoogleSignIn,
        auto_select: false,
        cancel_on_tap_outside: true
      });

      container.innerHTML = '';
      google.accounts.id.renderButton(container, {
        type: 'standard',
        theme: 'outline',
        size: 'large',
        text: 'signin_with',
        shape: 'pill',
        width: 210
      });
    }

    function shouldHideAuthButtons() {
      return !!getValidCurrentUser();
    }

    function applyAuthButtonVisibility() {
      const hide = shouldHideAuthButtons();
      document.querySelectorAll('a[href="login.html"], a[href="signup.html"]').forEach((link) => {
        link.style.display = hide ? 'none' : '';
      });
    }

    applyAuthButtonVisibility();

    // Create floating particles
    function createParticles() {
      const particlesContainer = document.getElementById('particles');
      const particleCount = 15;

      for (let i = 0; i < particleCount; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        particle.style.left = Math.random() * 100 + '%';
        particle.style.animationDelay = Math.random() * 8 + 's';
        particle.style.animationDuration = (8 + Math.random() * 4) + 's';
        particlesContainer.appendChild(particle);
      }
    }

    createParticles();
    window.addEventListener('load', setupGoogleSignIn);

    const autoLoggedInUser = getValidCurrentUser();
    if (autoLoggedInUser) {
      const autoName = autoLoggedInUser.fullName || autoLoggedInUser.username || autoLoggedInUser.email || 'User';
      alert(`Auto login successful. Welcome back, ${autoName}!`);
      setTimeout(() => {
        window.location.href = 'index.html';
      }, 250);
    }

    // Password toggle
    const togglePassword = document.getElementById('togglePassword');
    const passwordInput = document.getElementById('password');

    togglePassword.addEventListener('click', function() {
      const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
      passwordInput.setAttribute('type', type);
      this.textContent = type === 'password' ? '👁️' : '🙈';
    });

    // Form submission with local credential validation
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const email = document.getElementById('email').value.trim().toLowerCase();
      const password = document.getElementById('password').value;
      const rememberMe = document.getElementById('remember').checked;

      const users = JSON.parse(localStorage.getItem('users')) || [];
      const encodedPassword = btoa(password);
      const matchedUser = users.find(user => user.email === email && user.password === encodedPassword);

      if (!matchedUser) {
        alert('Invalid email or password. Please try again.');
        return;
      }

      localStorage.setItem('currentUser', JSON.stringify({
        id: matchedUser.id,
        username: matchedUser.username || '',
        email: matchedUser.email,
        fullName: `${matchedUser.firstName || ''} ${matchedUser.lastName || ''}`.trim(),
        department: matchedUser.department || '',
        semester: matchedUser.semester || ''
      }));
      createAuthSession();
      sessionStorage.setItem('skipAutoLoginMessageOnce', '1');

      localStorage.setItem('studentProfile', JSON.stringify({
        fullName: `${matchedUser.firstName || ''} ${matchedUser.lastName || ''}`.trim(),
        email: matchedUser.email,
        department: matchedUser.department || '',
        semester: matchedUser.semester || ''
      }));

      if (rememberMe) {
        localStorage.setItem('rememberedEmail', matchedUser.email);
      } else {
        localStorage.removeItem('rememberedEmail');
      }
      
      // Send email notification
      sendLoginNotification(email, 'Email Login');
      
      // Redirect to home page
      setTimeout(() => {
        window.location.href = 'index.html';
      }, 1000);
    });

    // Function to send email notification
    function sendLoginNotification(userEmail, loginType) {
      // Email notification will be sent to: arnavpanwala@gmail.com
      // (Configure this in your EmailJS template settings)
      const templateParams = {
        user_email: userEmail,
        login_type: loginType,
        login_time: new Date().toLocaleString(),
        user_ip: 'Browser Info: ' + navigator.userAgent
      };

      // Send email using EmailJS
      // Replace 'YOUR_SERVICE_ID' and 'YOUR_TEMPLATE_ID' with your actual EmailJS IDs
      emailjs.send('YOUR_SERVICE_ID', 'YOUR_TEMPLATE_ID', templateParams)
        .then(function(response) {
          console.log('Email notification sent!', response.status, response.text);
        }, function(error) {
          console.log('Failed to send notification:', error);
        });
    }

    // Guest login
    document.getElementById('guestLogin').addEventListener('click', function() {
      sendLoginNotification('Guest User', 'Guest Login');
      alert('Logging in as Guest...');
      localStorage.setItem('currentUser', JSON.stringify({
        id: 'guest-user',
        username: 'guest',
        email: 'guest@local',
        fullName: 'Guest User',
        department: '',
        semester: ''
      }));
      createAuthSession();
      sessionStorage.setItem('skipAutoLoginMessageOnce', '1');
      setTimeout(() => {
        window.location.href = 'index.html';
      }, 1000);
    });

    // Forgot password flow (local storage users)
    const forgotPasswordLink = document.getElementById('forgotPasswordLink');
    const resetPasswordModal = document.getElementById('resetPasswordModal');
    const resetPasswordForm = document.getElementById('resetPasswordForm');
    const resetModalCloseBtn = document.getElementById('resetModalCloseBtn');
    const resetFeedback = document.getElementById('resetFeedback');
    const resetEmailInput = document.getElementById('resetEmail');
    const resetNewPasswordInput = document.getElementById('resetNewPassword');
    const resetConfirmPasswordInput = document.getElementById('resetConfirmPassword');

    function setResetFeedback(message, type) {
      resetFeedback.textContent = message;
      resetFeedback.className = `reset-feedback ${type}`;
    }

    function clearResetFeedback() {
      resetFeedback.textContent = '';
      resetFeedback.className = 'reset-feedback';
    }

    function openResetModal() {
      clearResetFeedback();
      resetPasswordForm.reset();
      const loginEmail = document.getElementById('email').value.trim();
      if (loginEmail) {
        resetEmailInput.value = loginEmail;
      }
      resetPasswordModal.classList.add('show');
      setTimeout(() => resetEmailInput.focus(), 50);
    }

    function closeResetModal() {
      resetPasswordModal.classList.remove('show');
      clearResetFeedback();
    }

    if (forgotPasswordLink) {
      forgotPasswordLink.addEventListener('click', function(e) {
        e.preventDefault();
        openResetModal();
      });
    }

    resetModalCloseBtn.addEventListener('click', closeResetModal);
    resetPasswordModal.addEventListener('click', function(event) {
      if (event.target === resetPasswordModal) {
        closeResetModal();
      }
    });

    resetPasswordForm.addEventListener('submit', function(e) {
      e.preventDefault();

      const email = resetEmailInput.value.trim().toLowerCase();
      const newPassword = resetNewPasswordInput.value;
      const confirmPassword = resetConfirmPasswordInput.value;

      if (!email) {
        setResetFeedback('Please enter your registered email.', 'error');
        return;
      }

      if (newPassword.length < 8) {
        setResetFeedback('Password must be at least 8 characters long.', 'error');
        return;
      }

      if (newPassword !== confirmPassword) {
        setResetFeedback('Passwords do not match. Please try again.', 'error');
        return;
      }

      const users = JSON.parse(localStorage.getItem('users')) || [];
      const userIndex = users.findIndex((user) => (user.email || '').toLowerCase() === email);

      if (userIndex === -1) {
        setResetFeedback('No account found with this email.', 'error');
        return;
      }

      users[userIndex].password = btoa(newPassword);
      localStorage.setItem('users', JSON.stringify(users));
      setResetFeedback('Password updated successfully. You can now log in.', 'success');

      setTimeout(() => {
        closeResetModal();
        document.getElementById('email').value = email;
        document.getElementById('password').value = '';
        document.getElementById('password').focus();
      }, 900);
    });

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape' && resetPasswordModal.classList.contains('show')) {
        closeResetModal();
      }
    });

    // Prefill remembered email if available
    const rememberedEmail = localStorage.getItem('rememberedEmail');
    if (rememberedEmail) {
      document.getElementById('email').value = rememberedEmail;
      document.getElementById('remember').checked = true;
    }

    // ========== AUTO DEVICE DETECTION & RESPONSIVE SYSTEM ==========
    class DeviceDetector {
      constructor() {
        this.deviceType = 'desktop';
        this.os = 'unknown';
        this.isMobile = false;
        this.isTablet = false;
        this.isDesktop = false;
        this.isPortrait = true;
        this.screenWidth = window.innerWidth;
        this.screenHeight = window.innerHeight;
        
        this.init();
      }

      init() {
        this.detectDevice();
        this.detectOS();
        this.detectOrientation();
        this.applyDeviceClasses();
        this.setupEventListeners();
      }

      detectDevice() {
        const ua = navigator.userAgent.toLowerCase();
        const screenWidth = window.innerWidth;
        const isMobileUA = /android|webos|iphone|ipad|ipod|blackberry|iemobile|opera mini/i.test(ua);
        const isTabletUA = /ipad|android(?!.*mobile)|xoom|kindle|playbook/i.test(ua);

        if (screenWidth <= 480) {
          this.deviceType = 'phone';
          this.isMobile = true;
        } else if (screenWidth <= 1024) {
          this.deviceType = 'tablet';
          this.isTablet = true;
          this.isMobile = true;
        } else {
          this.deviceType = 'desktop';
          this.isDesktop = true;
        }

        if (isMobileUA && !isTabletUA && screenWidth <= 768) {
          this.deviceType = 'phone';
          this.isMobile = true;
          this.isTablet = false;
        } else if (isTabletUA) {
          this.deviceType = 'tablet';
          this.isTablet = true;
          this.isMobile = true;
        }
      }

      detectOS() {
        const ua = navigator.userAgent.toLowerCase();

        if (ua.indexOf('win') > -1) {
          this.os = 'Windows';
        } else if (ua.indexOf('mac') > -1 && ua.indexOf('iphone') === -1 && ua.indexOf('ipad') === -1) {
          this.os = 'Mac';
        } else if (ua.indexOf('iphone') > -1 || ua.indexOf('ipad') > -1 || ua.indexOf('ipod') > -1) {
          this.os = 'iOS';
          this.deviceType = this.deviceType === 'desktop' ? 'tablet' : this.deviceType;
          if (ua.indexOf('iphone') > -1 || ua.indexOf('ipod') > -1) {
            this.deviceType = 'phone';
          }
        } else if (ua.indexOf('android') > -1) {
          this.os = 'Android';
          this.deviceType = this.deviceType === 'desktop' ? 'phone' : this.deviceType;
        } else if (ua.indexOf('linux') > -1 && ua.indexOf('x11') > -1) {
          this.os = 'Linux';
        }
      }

      detectOrientation() {
        this.isPortrait = window.innerHeight >= window.innerWidth;
      }

      applyDeviceClasses() {
        const html = document.documentElement;
        
        html.classList.remove('device-phone', 'device-tablet', 'device-desktop');
        html.classList.remove('os-ios', 'os-android', 'os-windows', 'os-mac', 'os-linux');
        html.classList.remove('orientation-portrait', 'orientation-landscape');
        html.classList.remove('touch-enabled', 'touch-disabled');

        html.classList.add(`device-${this.deviceType}`);

        if (this.os !== 'unknown') {
          html.classList.add(`os-${this.os.toLowerCase()}`);
        }

        html.classList.add(this.isPortrait ? 'orientation-portrait' : 'orientation-landscape');

        const isTouchDevice = () => {
          return (('ontouchstart' in window) ||
                  (navigator.maxTouchPoints > 0) ||
                  (navigator.msMaxTouchPoints > 0));
        };

        if (isTouchDevice()) {
          html.classList.add('touch-enabled');
        } else {
          html.classList.add('touch-disabled');
        }

        if (this.isMobile) {
          document.body.style.overscrollBehavior = 'contain';
        }
      }

      setupEventListeners() {
        window.addEventListener('orientationchange', () => {
          setTimeout(() => {
            this.detectOrientation();
            this.applyDeviceClasses();
          }, 100);
        });

        let resizeTimeout;
        window.addEventListener('resize', () => {
          clearTimeout(resizeTimeout);
          resizeTimeout = setTimeout(() => {
            this.screenWidth = window.innerWidth;
            this.screenHeight = window.innerHeight;
            this.detectDevice();
            this.detectOrientation();
            this.applyDeviceClasses();
          }, 250);
        });

        if (this.os === 'iOS') {
          document.addEventListener('gesturestart', (e) => {
            e.preventDefault();
          });
        }
      }
    }

    const deviceDetector = new DeviceDetector();

    const style = document.createElement('style');
    style.textContent = `
      html.device-phone {
        --touch-target: 44px;
      }

      html.device-phone button,
      html.device-phone a {
        min-height: var(--touch-target);
        min-width: var(--touch-target);
        padding: 12px 16px !important;
      }

      html.device-phone.os-ios input,
      html.device-phone.os-ios button,
      html.device-phone.os-ios a {
        font-size: 16px;
      }

      html.device-tablet form {
        max-width: 500px !important;
      }

      html.orientation-landscape.device-phone {
        --header-height: 50px;
      }

      html.touch-enabled {
        --transition-duration: 0.15s;
      }

      html.touch-enabled button,
      html.touch-enabled a {
        transition: background-color 0.15s ease, transform 0.15s ease;
      }

      html.os-ios {
        -webkit-user-select: none;
        -webkit-touch-callout: none;
      }

      html.os-ios:not(.device-desktop) body {
        -webkit-font-smoothing: antialiased;
        -webkit-backface-visibility: hidden;
      }

      html.os-android {
        scroll-behavior: smooth;
      }

      html {
        scroll-behavior: smooth;
      }

      html {
        overflow-y: scroll;
      }

      @media (prefers-reduced-motion: reduce) {
        * {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
        }
      }
    `;
    document.head.appendChild(style);
  </script>
