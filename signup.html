<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#0f172a" />
  <title>Sign Up - College Study Material Hub</title>

  <style>
    :root {
      --bg: #0f172a;
      --bg-light: #111827;
      --primary: #3b82f6;
      --accent: #22c55e;
      --text: #e5e7eb;
      --muted: #9ca3af;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      background: #000000;
      color: var(--text);
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 0;
      margin: 0;
      overflow-x: hidden;
      overflow-y: auto;
      min-height: 100vh;
      touch-action: pan-y pinch-zoom;
      -webkit-overflow-scrolling: touch;
    }

    .signup-container {
      width: 100%;
      max-width: 450px;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.05));
      backdrop-filter: blur(20px) saturate(180%);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 20px;
      padding: 40px 20px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      animation: slideUp 0.6s ease;
      margin: 88px 12px 24px;
    }

    input,
    select,
    textarea {
      -webkit-user-select: text;
      user-select: text;
      touch-action: manipulation;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .signup-header {
      text-align: center;
      margin-bottom: 30px;
    }

    .signup-header h1 {
      font-size: 28px;
      margin-bottom: 10px;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .signup-header p {
      color: var(--muted);
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .password-field-wrapper {
      position: relative;
    }

    .password-field-wrapper input {
      padding-right: 52px;
    }

    .password-toggle-btn {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      width: 30px;
      height: 30px;
      border: 1px solid rgba(59, 130, 246, 0.45);
      border-radius: 50%;
      background: rgba(59, 130, 246, 0.12);
      color: #93c5fd;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.25s ease, box-shadow 0.25s ease, background 0.25s ease, border-color 0.25s ease;
      box-shadow: 0 0 0 rgba(59, 130, 246, 0);
    }

    .password-toggle-btn:hover {
      transform: translateY(-50%) scale(1.08);
      background: rgba(59, 130, 246, 0.2);
      border-color: rgba(96, 165, 250, 0.8);
      box-shadow: 0 0 14px rgba(59, 130, 246, 0.35);
    }

    .password-toggle-btn:active {
      transform: translateY(-50%) scale(0.95);
    }

    .password-toggle-btn.active {
      background: rgba(16, 185, 129, 0.18);
      border-color: rgba(16, 185, 129, 0.75);
      color: #6ee7b7;
      animation: eyePulse 1.2s ease-in-out infinite;
    }

    @keyframes eyePulse {
      0%,
      100% {
        box-shadow: 0 0 8px rgba(16, 185, 129, 0.22);
      }
      50% {
        box-shadow: 0 0 16px rgba(16, 185, 129, 0.45);
      }
    }

    .password-field-wrapper input.showing-password {
      border-color: rgba(16, 185, 129, 0.7);
      box-shadow: 0 0 18px rgba(16, 185, 129, 0.24);
      transition: border-color 0.25s ease, box-shadow 0.25s ease;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.9);
    }

    input, select {
      width: 100%;
      padding: 12px 16px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(139, 92, 246, 0.3);
      border-radius: 10px;
      color: var(--text);
      font-size: 14px;
      transition: all 0.3s ease;
    }

    input:focus, select:focus {
      outline: none;
      background: rgba(139, 92, 246, 0.15);
      border-color: rgba(139, 92, 246, 0.6);
      box-shadow: 0 0 20px rgba(139, 92, 246, 0.3);
    }

    input::placeholder {
      color: rgba(255, 255, 255, 0.4);
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }

    .signup-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--primary), #8b5cf6);
      border: none;
      border-radius: 10px;
      color: white;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 20px;
    }

    .profile-preview-btn {
      position: fixed;
      top: 14px;
      right: 12px;
      z-index: 1000;
      padding: 8px 14px;
      border-radius: 999px;
      border: 1px solid rgba(148, 163, 184, 0.38);
      background: rgba(30, 41, 59, 0.78);
      color: #e2e8f0;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease, border-color 0.2s ease;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.24);
    }

    .profile-preview-btn:hover {
      background: rgba(51, 65, 85, 0.9);
      border-color: rgba(96, 165, 250, 0.6);
      box-shadow: 0 10px 24px rgba(59, 130, 246, 0.25);
      transform: translateY(-1px);
    }

    .profile-modal {
      position: fixed;
      inset: 0;
      background: rgba(2, 6, 23, 0.7);
      backdrop-filter: blur(6px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 2000;
      padding: 16px;
    }

    .profile-modal.show {
      display: flex;
      animation: fadeInModal 0.24s ease;
    }

    @keyframes fadeInModal {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .profile-modal-card {
      width: 100%;
      max-width: 460px;
      background: linear-gradient(135deg, rgba(15, 23, 42, 0.95), rgba(30, 41, 59, 0.95));
      border: 1px solid rgba(148, 163, 184, 0.35);
      border-radius: 14px;
      padding: 18px;
      color: #e2e8f0;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.35);
      animation: slideUp 0.25s ease;
    }

    .profile-modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .profile-modal-header h3 {
      font-size: 18px;
      color: #93c5fd;
    }

    .profile-avatar-section {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
      padding: 10px;
      border: 1px solid rgba(148, 163, 184, 0.25);
      border-radius: 10px;
      background: rgba(148, 163, 184, 0.08);
    }

    .profile-avatar-preview {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      border: 1px solid rgba(96, 165, 250, 0.45);
      object-fit: cover;
      background: rgba(30, 41, 59, 0.9);
      flex-shrink: 0;
    }

    .profile-avatar-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .profile-avatar-btn {
      border: 1px solid rgba(96, 165, 250, 0.45);
      background: rgba(59, 130, 246, 0.12);
      color: #bfdbfe;
      border-radius: 8px;
      padding: 6px 10px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
    }

    .profile-avatar-btn.remove {
      border-color: rgba(239, 68, 68, 0.45);
      background: rgba(239, 68, 68, 0.12);
      color: #fecaca;
    }

    .profile-close-btn {
      border: none;
      background: rgba(239, 68, 68, 0.15);
      color: #fda4af;
      border-radius: 8px;
      padding: 6px 10px;
      cursor: pointer;
      font-weight: 700;
    }

    .profile-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .profile-item {
      background: rgba(148, 163, 184, 0.12);
      border: 1px solid rgba(148, 163, 184, 0.25);
      border-radius: 10px;
      padding: 10px;
    }

    .profile-item.full {
      grid-column: 1 / -1;
    }

    .profile-item-label {
      display: block;
      font-size: 11px;
      color: #94a3b8;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    .profile-item-value {
      font-size: 13px;
      font-weight: 600;
      color: #e2e8f0;
      word-break: break-word;
    }

    .signup-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(59, 130, 246, 0.4);
    }

    .login-link {
      text-align: center;
      margin-top: 20px;
      font-size: 14px;
      color: var(--muted);
    }

    .login-link a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
      transition: all 0.3s ease;
    }

    .login-link a:hover {
      color: #8b5cf6;
      text-decoration: underline;
    }

    .success-message {
      display: none;
      background: rgba(34, 197, 94, 0.2);
      border: 1px solid rgba(34, 197, 94, 0.5);
      color: #bbf7d0;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 20px;
      text-align: center;
      animation: slideUp 0.3s ease;
    }

    .error-message {
      display: none;
      background: rgba(239, 68, 68, 0.2);
      border: 1px solid rgba(239, 68, 68, 0.5);
      color: #fca5a5;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 20px;
      text-align: center;
    }

    @media (max-width: 600px) {
      .signup-container {
        padding: 26px 14px;
        margin-top: 78px;
        max-width: calc(100% - 16px);
      }

      .form-row {
        grid-template-columns: 1fr;
      }

      .password-toggle-btn {
        width: 34px;
        height: 34px;
        right: 10px;
      }

      .profile-preview-btn {
        top: 10px;
        right: 10px;
        font-size: 12px;
        padding: 7px 12px;
      }
    }
  </style>
</head>
<body>
  <!-- Back to Home Link -->
  <div id="backHomeWrap" style="position: fixed; top: 14px; left: 12px; z-index: 1000;">
    <a href="index.html" id="backHomeLink" style="color: rgba(255,255,255,0.7); text-decoration: none; font-size: 14px; display: flex; align-items: center; gap: 5px; padding: 8px 14px; background: rgba(255,255,255,0.05); border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); transition: all 0.3s;" onmouseover="this.style.background='rgba(255,255,255,0.1)'; this.style.color='#fff';" onmouseout="this.style.background='rgba(255,255,255,0.05)'; this.style.color='rgba(255,255,255,0.7)';">
      ← Back to Home
    </a>
  </div>

  <button type="button" id="profilePreviewBtn" class="profile-preview-btn">👤 Profile</button>

  <div class="signup-container">
    <div class="signup-header">
      <h1>Create Account</h1>
      <p>Join CODEX and access all study materials</p>
    </div>

    <div class="success-message" id="successMsg">✅ Account created successfully! Redirecting to login...</div>
    <div class="error-message" id="errorMsg">⚠️ Error creating account. Please try again.</div>

    <form id="signupForm">
      <div class="form-row">
        <div class="form-group">
          <label for="firstName">First Name *</label>
          <input type="text" id="firstName" name="firstName" placeholder="Arnav" required>
        </div>
        <div class="form-group">
          <label for="lastName">Last Name *</label>
          <input type="text" id="lastName" name="lastName" placeholder="Panwala" required>
        </div>
      </div>

      <div class="form-group">
        <label for="username">Username *</label>
        <input type="text" id="username" name="username" placeholder="arnav123" minlength="3" required>
      </div>

      <div class="form-group">
        <label for="email">Email Address *</label>
        <input type="email" id="email" name="email" placeholder="your.email@college.edu" required>
      </div>

      <div class="form-group">
        <label for="password">Password *</label>
        <div class="password-field-wrapper">
          <input type="password" id="password" name="password" placeholder="At least 8 characters" minlength="8" required>
          <button type="button" class="password-toggle-btn" data-target="password" aria-label="Show password">👁️</button>
        </div>
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirm Password *</label>
        <div class="password-field-wrapper">
          <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Re-enter password" required>
          <button type="button" class="password-toggle-btn" data-target="confirmPassword" aria-label="Show confirm password">👁️</button>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="department">Department *</label>
          <select id="department" name="department" required>
            <option value="">Select Department</option>
            <option value="CSE">Computer Science</option>
            <option value="ECE">Electronics & Communication</option>
            <option value="ME">Mechanical</option>
            <option value="CE">Civil</option>
            <option value="EE">Electrical</option>
            <option value="IT">Information Technology</option>
          </select>
        </div>
        <div class="form-group">
          <label for="semester">Semester *</label>
          <select id="semester" name="semester" required>
            <option value="">Select Semester</option>
            <option value="1">1st Semester</option>
            <option value="2">2nd Semester</option>
            <option value="3">3rd Semester</option>
            <option value="4">4th Semester</option>
            <option value="5">5th Semester</option>
            <option value="6">6th Semester</option>
            <option value="7">7th Semester</option>
            <option value="8">8th Semester</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label for="collegeIdNo">College ID No *</label>
        <input type="text" id="collegeIdNo" name="collegeIdNo" placeholder="22CE001" required>
      </div>

      <div class="form-group">
        <label for="college">College Name *</label>
        <input type="text" id="college" name="college" placeholder="Your College Name" required>
      </div>

      <button type="submit" class="signup-btn">Create Account</button>
    </form>

    <div class="login-link">
      Already have an account? <a href="login.html">Login here</a>
    </div>
  </div>

  <div id="profileModal" class="profile-modal" role="dialog" aria-modal="true" aria-label="Profile Details">
    <div class="profile-modal-card">
      <div class="profile-modal-header">
        <h3>Profile Preview</h3>
        <button type="button" class="profile-close-btn" id="profileCloseBtn">✕</button>
      </div>
      <div class="profile-avatar-section">
        <img id="profileAvatarPreview" class="profile-avatar-preview" alt="Profile preview" src="" />
        <div class="profile-avatar-actions">
          <button type="button" id="uploadProfileImageBtn" class="profile-avatar-btn">Upload Image</button>
          <button type="button" id="removeProfileImageBtn" class="profile-avatar-btn remove">Remove</button>
          <input type="file" id="profileImageInput" accept="image/*" style="display:none;" />
        </div>
      </div>
      <div class="profile-grid" id="profileGrid"></div>
    </div>
  </div>

  <script>
    const AUTH_SESSION_KEY = 'authSession';

    function clearAuthSession() {
      localStorage.removeItem('currentUser');
      localStorage.removeItem(AUTH_SESSION_KEY);
      localStorage.removeItem('rememberedEmail');
    }

    function getValidCurrentUser() {
      const currentUserRaw = localStorage.getItem('currentUser');
      const authSessionRaw = localStorage.getItem(AUTH_SESSION_KEY);

      if (!currentUserRaw || !authSessionRaw) {
        return null;
      }

      try {
        const currentUser = JSON.parse(currentUserRaw);
        const authSession = JSON.parse(authSessionRaw);
        const expiresAt = Number(authSession.expiresAt || 0);

        if (!expiresAt || Date.now() > expiresAt) {
          clearAuthSession();
          return null;
        }

        return currentUser;
      } catch (error) {
        clearAuthSession();
        return null;
      }
    }

    function shouldHideAuthButtons() {
      return !!getValidCurrentUser();
    }

    function applyAuthButtonVisibility() {
      const hide = shouldHideAuthButtons();
      document.querySelectorAll('a[href="login.html"], a[href="signup.html"]').forEach((link) => {
        link.style.display = hide ? 'none' : '';
      });
    }

    applyAuthButtonVisibility();

    // ===== GOOGLE SHEETS CONFIGURATION =====
    // Deployed Google Apps Script Web App URL
    const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyb6bFjDHX08ZQRWyF8G6VcKjHlzXS02dbf5Kn5XZELGGyN-91Og8CTxllsmD8QTA/exec';

    // Animated show/hide password toggles
    document.querySelectorAll('.password-toggle-btn').forEach((toggleBtn) => {
      toggleBtn.addEventListener('click', () => {
        const targetId = toggleBtn.getAttribute('data-target');
        const input = document.getElementById(targetId);
        if (!input) return;

        const show = input.type === 'password';
        input.type = show ? 'text' : 'password';
        input.classList.toggle('showing-password', show);
        toggleBtn.classList.toggle('active', show);
        toggleBtn.textContent = show ? '🙈' : '👁️';
        toggleBtn.setAttribute('aria-label', show ? 'Hide password' : 'Show password');
      });
    });

    // Profile preview modal
    const profilePreviewBtn = document.getElementById('profilePreviewBtn');
    const profileModal = document.getElementById('profileModal');
    const profileGrid = document.getElementById('profileGrid');
    const profileCloseBtn = document.getElementById('profileCloseBtn');
    const profileAvatarPreview = document.getElementById('profileAvatarPreview');
    const uploadProfileImageBtn = document.getElementById('uploadProfileImageBtn');
    const removeProfileImageBtn = document.getElementById('removeProfileImageBtn');
    const profileImageInput = document.getElementById('profileImageInput');

    function setProfileAvatarPreview() {
      const savedImage = localStorage.getItem('profileImage');
      if (savedImage) {
        profileAvatarPreview.src = savedImage;
      } else {
        profileAvatarPreview.src = 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="56" height="56"><rect width="56" height="56" fill="%231e293b"/><text x="50%" y="54%" dominant-baseline="middle" text-anchor="middle" font-size="20" fill="%2394a3b8">U</text></svg>';
      }
    }

    function getFormProfileData() {
      return {
        'First Name': document.getElementById('firstName').value.trim() || '-',
        'Last Name': document.getElementById('lastName').value.trim() || '-',
        'Username': document.getElementById('username').value.trim() || '-',
        'Email': document.getElementById('email').value.trim() || '-',
        'Department': document.getElementById('department').value || '-',
        'Semester': document.getElementById('semester').value || '-',
        'College ID No': document.getElementById('collegeIdNo').value.trim() || '-',
        'College': document.getElementById('college').value.trim() || '-',
        'Password': document.getElementById('password').value ? '********' : '-'
      };
    }

    function renderProfilePreview() {
      const profileData = getFormProfileData();
      profileGrid.innerHTML = Object.entries(profileData)
        .map(([label, value]) => {
          const fullClass = (label === 'Email' || label === 'College') ? 'full' : '';
          return `
            <div class="profile-item ${fullClass}">
              <span class="profile-item-label">${label}</span>
              <span class="profile-item-value">${value}</span>
            </div>
          `;
        })
        .join('');
    }

    function openProfileModal() {
      renderProfilePreview();
      setProfileAvatarPreview();
      profileModal.classList.add('show');
    }

    function closeProfileModal() {
      profileModal.classList.remove('show');
    }

    profilePreviewBtn.addEventListener('click', openProfileModal);
    profileCloseBtn.addEventListener('click', closeProfileModal);
    profileModal.addEventListener('click', (event) => {
      if (event.target === profileModal) {
        closeProfileModal();
      }
    });

    uploadProfileImageBtn.addEventListener('click', () => {
      profileImageInput.click();
    });

    profileImageInput.addEventListener('change', () => {
      const file = profileImageInput.files && profileImageInput.files[0];
      if (!file) {
        return;
      }

      if (!file.type.startsWith('image/')) {
        alert('Please choose an image file.');
        return;
      }

      const reader = new FileReader();
      reader.onload = () => {
        const imageData = String(reader.result || '');
        localStorage.setItem('profileImage', imageData);
        setProfileAvatarPreview();
      };
      reader.readAsDataURL(file);
    });

    removeProfileImageBtn.addEventListener('click', () => {
      localStorage.removeItem('profileImage');
      setProfileAvatarPreview();
    });

    // Function to send data to Google Sheets
    async function saveToGoogleSheets(userData) {
      try {
        const query = new URLSearchParams();
        query.append('action', 'saveUser');
        Object.entries(userData).forEach(([key, value]) => {
          query.append(key, value == null ? '' : String(value));
        });

        await fetch(`${GOOGLE_SCRIPT_URL}?${query.toString()}`, {
          method: 'GET',
          mode: 'no-cors',
        });
        console.log('Data sent to Google Sheets successfully');
        return true;
      } catch (error) {
        console.error('Error saving to Google Sheets:', error);
        return false;
      }
    }

    document.getElementById('signupForm').addEventListener('submit', async function(e) {
      e.preventDefault();

      const firstName = document.getElementById('firstName').value;
      const lastName = document.getElementById('lastName').value;
      const username = document.getElementById('username').value.trim();
      const email = document.getElementById('email').value.trim().toLowerCase();
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const department = document.getElementById('department').value;
      const semester = document.getElementById('semester').value;
      const collegeIdNo = document.getElementById('collegeIdNo').value.trim();
      const college = document.getElementById('college').value;

      const errorMsg = document.getElementById('errorMsg');
      const successMsg = document.getElementById('successMsg');

      // Validate passwords match
      if (password !== confirmPassword) {
        errorMsg.textContent = '⚠️ Passwords do not match!';
        errorMsg.style.display = 'block';
        successMsg.style.display = 'none';
        return;
      }

      if (username.length < 3) {
        errorMsg.textContent = '⚠️ Username must be at least 3 characters.';
        errorMsg.style.display = 'block';
        successMsg.style.display = 'none';
        return;
      }

      // Create user object
      const user = {
        firstName,
        lastName,
        username,
        email,
        password: btoa(password), // Basic encoding (not secure for production)
        department,
        semester,
        collegeIdNo,
        college,
        createdAt: new Date().toISOString(),
        id: 'user-' + Date.now()
      };

      // Get existing users
      let users = JSON.parse(localStorage.getItem('users')) || [];

      // Check if email already exists
      if (users.some(u => u.email === email)) {
        errorMsg.textContent = '⚠️ Email already registered!';
        errorMsg.style.display = 'block';
        successMsg.style.display = 'none';
        return;
      }

      if (users.some(u => (u.username || '').toLowerCase() === username.toLowerCase())) {
        errorMsg.textContent = '⚠️ Username already taken!';
        errorMsg.style.display = 'block';
        successMsg.style.display = 'none';
        return;
      }

      // Save user locally
      users.push(user);
      localStorage.setItem('users', JSON.stringify(users));

      // Save profile details for quick use in other pages
      localStorage.setItem('studentProfile', JSON.stringify({
        fullName: `${firstName} ${lastName}`.trim(),
        username,
        email,
        department,
        semester,
        collegeIdNo,
        college
      }));

      // Keep latest credentials in local storage with explicit key names
      localStorage.setItem('latestUserCredentials', JSON.stringify({
        username,
        email,
        password: btoa(password)
      }));

      // Save to Google Sheets (if configured)
      if (GOOGLE_SCRIPT_URL !== 'YOUR_GOOGLE_SCRIPT_URL_HERE') {
        await saveToGoogleSheets(user);
      }

      // Show success message
      successMsg.style.display = 'block';
      errorMsg.style.display = 'none';

      // Redirect to login after 2 seconds
      setTimeout(() => {
        window.location.href = 'login.html';
      }, 2000);
    });

    // Function to download all users as CSV (for admin)
    function downloadUsersAsCSV() {
      const users = JSON.parse(localStorage.getItem('users')) || [];
      
      if (users.length === 0) {
        alert('No users to export!');
        return;
      }

      // Create CSV content
      const headers = ['ID', 'First Name', 'Last Name', 'Email', 'Department', 'Semester', 'College ID No', 'College', 'Created At'];
      const csvRows = [headers.join(',')];

      users.forEach(user => {
        const row = [
          user.id,
          user.firstName,
          user.lastName,
          user.email,
          user.department,
          user.semester,
          user.collegeIdNo || '',
          user.college,
          user.createdAt
        ];
        csvRows.push(row.join(','));
      });

      const csvContent = csvRows.join('\n');

      // Create download link
      const blob = new Blob([csvContent], { type: 'text/csv' });
      const url = window.URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'codex_users_' + new Date().toISOString().split('T')[0] + '.csv';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      window.URL.revokeObjectURL(url);
    }

    // Press Ctrl+Shift+E to export users (hidden admin feature)
    document.addEventListener('keydown', function(e) {
      if (e.ctrlKey && e.shiftKey && e.key === 'E') {
        downloadUsersAsCSV();
      }
    });

    // ========== AUTO DEVICE DETECTION & RESPONSIVE SYSTEM ==========
    class DeviceDetector {
      constructor() {
        this.deviceType = 'desktop';
        this.os = 'unknown';
        this.isMobile = false;
        this.isTablet = false;
        this.isDesktop = false;
        this.isPortrait = true;
        this.screenWidth = window.innerWidth;
        this.screenHeight = window.innerHeight;
        
        this.init();
      }

      init() {
        this.detectDevice();
        this.detectOS();
        this.detectOrientation();
        this.applyDeviceClasses();
        this.setupEventListeners();
      }

      detectDevice() {
        const ua = navigator.userAgent.toLowerCase();
        const screenWidth = window.innerWidth;
        const isMobileUA = /android|webos|iphone|ipad|ipod|blackberry|iemobile|opera mini/i.test(ua);
        const isTabletUA = /ipad|android(?!.*mobile)|xoom|kindle|playbook/i.test(ua);

        if (screenWidth <= 480) {
          this.deviceType = 'phone';
          this.isMobile = true;
        } else if (screenWidth <= 1024) {
          this.deviceType = 'tablet';
          this.isTablet = true;
          this.isMobile = true;
        } else {
          this.deviceType = 'desktop';
          this.isDesktop = true;
        }

        if (isMobileUA && !isTabletUA && screenWidth <= 768) {
          this.deviceType = 'phone';
          this.isMobile = true;
          this.isTablet = false;
        } else if (isTabletUA) {
          this.deviceType = 'tablet';
          this.isTablet = true;
          this.isMobile = true;
        }
      }

      detectOS() {
        const ua = navigator.userAgent.toLowerCase();

        if (ua.indexOf('win') > -1) {
          this.os = 'Windows';
        } else if (ua.indexOf('mac') > -1 && ua.indexOf('iphone') === -1 && ua.indexOf('ipad') === -1) {
          this.os = 'Mac';
        } else if (ua.indexOf('iphone') > -1 || ua.indexOf('ipad') > -1 || ua.indexOf('ipod') > -1) {
          this.os = 'iOS';
          this.deviceType = this.deviceType === 'desktop' ? 'tablet' : this.deviceType;
          if (ua.indexOf('iphone') > -1 || ua.indexOf('ipod') > -1) {
            this.deviceType = 'phone';
          }
        } else if (ua.indexOf('android') > -1) {
          this.os = 'Android';
          this.deviceType = this.deviceType === 'desktop' ? 'phone' : this.deviceType;
        } else if (ua.indexOf('linux') > -1 && ua.indexOf('x11') > -1) {
          this.os = 'Linux';
        }
      }

      detectOrientation() {
        this.isPortrait = window.innerHeight >= window.innerWidth;
      }

      applyDeviceClasses() {
        const html = document.documentElement;
        
        html.classList.remove('device-phone', 'device-tablet', 'device-desktop');
        html.classList.remove('os-ios', 'os-android', 'os-windows', 'os-mac', 'os-linux');
        html.classList.remove('orientation-portrait', 'orientation-landscape');
        html.classList.remove('touch-enabled', 'touch-disabled');

        html.classList.add(`device-${this.deviceType}`);

        if (this.os !== 'unknown') {
          html.classList.add(`os-${this.os.toLowerCase()}`);
        }

        html.classList.add(this.isPortrait ? 'orientation-portrait' : 'orientation-landscape');

        const isTouchDevice = () => {
          return (('ontouchstart' in window) ||
                  (navigator.maxTouchPoints > 0) ||
                  (navigator.msMaxTouchPoints > 0));
        };

        if (isTouchDevice()) {
          html.classList.add('touch-enabled');
        } else {
          html.classList.add('touch-disabled');
        }

        if (this.isMobile) {
          document.body.style.overscrollBehaviorY = 'auto';
          document.body.style.webkitOverflowScrolling = 'touch';
        }
      }

      setupEventListeners() {
        window.addEventListener('orientationchange', () => {
          setTimeout(() => {
            this.detectOrientation();
            this.applyDeviceClasses();
          }, 100);
        });

        let resizeTimeout;
        window.addEventListener('resize', () => {
          clearTimeout(resizeTimeout);
          resizeTimeout = setTimeout(() => {
            this.screenWidth = window.innerWidth;
            this.screenHeight = window.innerHeight;
            this.detectDevice();
            this.detectOrientation();
            this.applyDeviceClasses();
          }, 250);
        });

        if (this.os === 'iOS') {
          document.addEventListener('gesturestart', (e) => {
            e.preventDefault();
          });
        }
      }
    }

    const deviceDetector = new DeviceDetector();

    const style = document.createElement('style');
    style.textContent = `
      html.device-phone {
        --touch-target: 44px;
      }

      html.device-phone .signup-btn,

        min-height: var(--touch-target);

        min-height: 34px;

      html.device-phone.os-ios input,

        font-size: 16px;

      html.device-tablet .signup-container {
        max-width: 500px !important;
      }

      html.orientation-landscape.device-phone {
        --header-height: 50px;
      }

      html.touch-enabled {
        --transition-duration: 0.15s;
      }

      html.touch-enabled button,
      html.touch-enabled a {
        transition: background-color 0.15s ease, transform 0.15s ease;
      }

      html.os-ios {
        -webkit-user-select: none;
        -webkit-touch-callout: none;
      }

      html.os-ios:not(.device-desktop) body {
        -webkit-font-smoothing: antialiased;
        -webkit-backface-visibility: hidden;
      }

      html.os-android {
        scroll-behavior: smooth;
      }

      html {
        scroll-behavior: smooth;
      }

      html {
        overflow-y: scroll;
      }

      @media (prefers-reduced-motion: reduce) {
        * {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
        }
      }
    `;
    document.head.appendChild(style);
  </script>
